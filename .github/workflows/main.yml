name: Publish daily paper report
on:
  workflow_dispatch:
  schedule:
    # 固定按 UTC 02:00 触发（规避 DST）
    - cron: '0 2 * * 1-5'

permissions:
  contents: write

concurrency:
  group: daily-paper-report
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Generate static report
        env:
          ZOTERO_ID: ${{ secrets.ZOTERO_ID || vars.ZOTERO_ID }}
          ZOTERO_KEY: ${{ secrets.ZOTERO_KEY || vars.ZOTERO_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || vars.OPENAI_API_KEY }}
          OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE || vars.OPENAI_API_BASE || 'https://api.deepseek.com/v1' }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL || vars.OPENAI_MODEL || 'deepseek-chat' }}
          INCLUDE_CROSS_LIST: ${{ vars.INCLUDE_CROSS_LIST || 'false' }}
          CUSTOM_CONFIG: ${{ vars.CUSTOM_CONFIG }}
        run: |
          if [ -n "$CUSTOM_CONFIG" ]; then
            printf "%b\n" "$CUSTOM_CONFIG" > /tmp/custom.yaml
            if uv run python - <<'PY'
          from omegaconf import OmegaConf
          try:
              base = OmegaConf.load("config/custom.yaml")
              override = OmegaConf.load("/tmp/custom.yaml")
              merged = OmegaConf.merge(base, override)
              OmegaConf.save(merged, "config/custom.yaml")
          except Exception as exc:
              detail = str(exc).splitlines()[0] if str(exc) else repr(exc)
              print(f"::warning::Ignoring invalid CUSTOM_CONFIG and using checked-in config/custom.yaml. Details: {type(exc).__name__}: {detail}")
              raise SystemExit(1)
          PY
            then
              echo "Use CUSTOM_CONFIG from repository variables."
            fi
          fi
          uv run src/zotero_arxiv_daily/main.py

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs archive index.html app .nojekyll
          if git diff --cached --quiet; then
            echo "No report changes to commit."
            exit 0
          fi
          git commit -m "[chore] daily paper report"
          git push
