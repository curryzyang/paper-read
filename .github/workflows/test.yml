name: Test
on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v7.1.4

      - name: Check secrets and external APIs
        env:
          ZOTERO_ID: ${{ secrets.ZOTERO_ID || vars.ZOTERO_ID }}
          ZOTERO_KEY: ${{ secrets.ZOTERO_KEY || vars.ZOTERO_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || vars.OPENAI_API_KEY }}
          OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE || vars.OPENAI_API_BASE || 'https://api.deepseek.com/v1' }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL || vars.OPENAI_MODEL || 'deepseek-chat' }}
          INCLUDE_CROSS_LIST: ${{ vars.INCLUDE_CROSS_LIST || 'false' }}
          CUSTOM_CONFIG: ${{ vars.CUSTOM_CONFIG }}
        run: |
          export DEBUG=true
          if [ -n "$CUSTOM_CONFIG" ]; then
            printf "%b\n" "$CUSTOM_CONFIG" > /tmp/custom.yaml
            if uv run python - <<'PY'
          from omegaconf import OmegaConf
          try:
              base = OmegaConf.load("config/custom.yaml")
              override = OmegaConf.load("/tmp/custom.yaml")
              merged = OmegaConf.merge(base, override)
              OmegaConf.save(merged, "config/custom.yaml")
          except Exception as exc:
              detail = str(exc).splitlines()[0] if str(exc) else repr(exc)
              print(f"::warning::Ignoring invalid CUSTOM_CONFIG and using checked-in config/custom.yaml. Details: {type(exc).__name__}: {detail}")
              raise SystemExit(1)
          PY
            then
              echo "Use CUSTOM_CONFIG from repository variables."
            fi
          fi
          uv run python - <<'PY'
          import os
          import traceback
          from hydra import compose, initialize_config_dir
          from openai import OpenAI
          from pyzotero import zotero

          def fail(message: str, exc: Exception | None = None) -> None:
              detail = message
              if exc is not None:
                  detail = f"{message} Details: {type(exc).__name__}: {exc}"
              print(f"::error::{detail}")
              summary = os.getenv("GITHUB_STEP_SUMMARY")
              if summary:
                  with open(summary, "a", encoding="utf-8") as handle:
                      handle.write("### Smoke test failed\n\n")
                      handle.write(detail + "\n")
              if os.getenv("DEBUG", "").lower() == "true" and exc is not None:
                  traceback.print_exception(type(exc), exc, exc.__traceback__)
              raise SystemExit(1)

          required = ["ZOTERO_ID", "ZOTERO_KEY", "OPENAI_API_KEY"]
          missing = [name for name in required if not os.getenv(name)]
          if missing:
              fail(f"Missing required secrets or repository variables: {', '.join(missing)}")

          try:
              with initialize_config_dir(config_dir=os.path.abspath("config"), version_base=None):
                  cfg = compose(config_name="default")
          except Exception as exc:
              fail(
                  "Hydra config compose failed. Check CUSTOM_CONFIG syntax and any ${oc.env:...} variables. ",
                  exc,
              )
          if not cfg.get("executor", {}).get("source"):
              fail("Configuration error: config.executor.source is missing or empty. Set executor.source in CUSTOM_CONFIG, e.g. [\"arxiv\"].")

          print("Testing Zotero credentials...")
          try:
              zot = zotero.Zotero(str(cfg.zotero.user_id), "user", str(cfg.zotero.api_key))
              items = zot.items(limit=1)
          except Exception as exc:
              fail("Zotero API check failed. Verify ZOTERO_ID and ZOTERO_KEY read permission.", exc)
          print(f"Zotero OK, fetched {len(items)} item(s).")

          print("Testing OpenAI-compatible LLM endpoint...")
          try:
              model = str(cfg.llm.generation_kwargs.model)
              base_url = str(cfg.llm.api.base_url)
              api_key = str(cfg.llm.api.key)
          except Exception as exc:
              fail("LLM config read failed. Verify llm.api.key, llm.api.base_url, and llm.generation_kwargs.model.", exc)

          print(f"LLM config: base_url={base_url}, model={model}")
          try:
              client = OpenAI(api_key=api_key, base_url=base_url)
              response = client.chat.completions.create(
                  model=model,
                  messages=[{"role": "user", "content": "Reply with OK."}],
                  max_tokens=8,
              )
          except Exception as exc:
              fail(
                  "LLM API check failed. For DeepSeek use OPENAI_API_BASE=https://api.deepseek.com/v1 "
                  "and OPENAI_MODEL=deepseek-chat, or set the same values in CUSTOM_CONFIG.",
                  exc,
              )
          content = response.choices[0].message.content or ""
          print(f"LLM OK, model={model}, response={content[:40]!r}")
          PY
