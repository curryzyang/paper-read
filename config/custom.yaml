zotero:
  user_id: ${oc.env:ZOTERO_ID}
  api_key: ${oc.env:ZOTERO_KEY}
  include_path: null # Or set a list of glob patterns, e.g. ["2026/survey/**","2026/reading-group/**"]

llm:
  api:
    key: ${oc.env:OPENAI_API_KEY}
    base_url: ${oc.env:OPENAI_API_BASE,https://api.deepseek.com/v1}
  generation_kwargs:
    model: ${oc.env:OPENAI_MODEL,deepseek-chat}

source:
  arxiv:
    category: ["cs.AI","cs.CV","cs.LG","cs.CL"]

executor:
  debug: ${oc.env:DEBUG,false}
  source: ['arxiv']

web:
  daily_total: 25
  deep_count: 10
  quick_count: 15
  language: Chinese
